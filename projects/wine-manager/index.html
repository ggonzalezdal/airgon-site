<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wine Manager</title>
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="container wm" style="padding: 32px 18px;">
    <div class="wm-top">
      <a class="btn small" href="/">← Back</a>
      <div>
        <h3 style="margin:0;">Wine Manager</h3>
        <p class="wm-sub" style="margin:4px 0 0;">Table + search + filters (MVP)</p>
      </div>
    </div>

    <section class="wm-controls card" style="margin-top:16px;">
      <div class="wm-row">
        <label class="wm-label">
          Search
          <input id="q" class="wm-input" type="search" placeholder="Name, producer, region, country..." />
        </label>

        <label class="wm-label">
          Type
          <select id="type" class="wm-input">
            <option value="">All</option>
          </select>
        </label>

        <label class="wm-label">
          Country
          <select id="country" class="wm-input">
            <option value="">All</option>
          </select>
        </label>

        <label class="wm-label">
          Region
          <select id="region" class="wm-input">
            <option value="">All</option>
          </select>
        </label>

        <button id="reset" class="btn small">Reset</button>
      </div>
    </section>

    <section class="wm-table card" style="margin-top:14px;">
      <div class="wm-meta">
        <div id="count" class="wm-count">0 wines</div>
        <div class="wm-hint">Tip: use search + dropdown filters</div>
      </div>

      <div class="wm-scroll">
        <table class="wm-t">
          <thead>
            <tr>
              <th>Name</th>
              <th>Producer</th>
              <th>Vintage</th>
              <th>Type</th>
              <th>Country</th>
              <th>Region</th>
              <th class="num">Price</th>
              <th class="num">ABV</th>
              <th class="num">cl</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>

      <div class="wm-pagination">
        <div id="page-info" class="wm-page-info">Showing 0–0 of 0</div>
        <div id="pagination" class="wm-page-controls"></div>
      </div>
    </section>
  </main>

    <div id="wine-modal" class="wm-modal" hidden>
    <div class="wm-modal-backdrop" id="wine-modal-backdrop"></div>

    <div
      class="wm-modal-card"
      role="dialog"
      aria-modal="true"
      aria-labelledby="wine-modal-title"
    >
      <div class="wm-modal-head">
        <div>
          <h3 id="wine-modal-title" class="wm-modal-title">Wine details</h3>
          <p id="wine-modal-subtitle" class="wm-modal-subtitle"></p>
        </div>

        <button
          id="wine-modal-close"
          class="btn small"
          type="button"
          aria-label="Close wine details"
        >
          ✕
        </button>
      </div>

      <div id="wine-modal-body" class="wm-modal-body"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
